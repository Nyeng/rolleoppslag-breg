name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Create deployment package
        run: |
          # Azure App Service kjorer fra /home/site/wwwroot.
          # Vi trenger server/, client/dist/, og rot package*.json.
          mkdir -p deploy/client/dist
          cp -r server deploy/
          cp -r client/dist deploy/client/dist
          cp package.json package-lock.json deploy/

          # Installer kun prod-avhengigheter i deploy-mappen
          cd deploy
          npm ci --omit=dev --workspace server

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: deploy

      - name: Health check
        run: |
          sleep 10
          curl -sf "https://${{ vars.AZURE_APP_NAME }}.azurewebsites.net/api/health" || echo "Health check failed (app may still be starting)"
